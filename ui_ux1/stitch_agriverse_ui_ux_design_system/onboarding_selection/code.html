<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .step-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Custom scrollbar suppression for cleaner UI */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-lg text-on-surface min-h-screen flex flex-col">
<!-- Sticky Header (Shared Component: TopAppBar suppressed for transaction flow, but identity maintained) -->
<header class="w-full bg-surface py-4 px-margin-mobile flex justify-between items-center z-50 border-b border-outline-variant">
<div class="font-headline-md text-headline-md text-primary font-bold">AgriVerse</div>
<div class="flex items-center gap-2">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Step 1 of 3</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-margin-mobile pt-xl pb-2xl max-w-md mx-auto w-full">
<!-- Progress Bar Indicator -->
<div class="w-full h-1 bg-surface-container rounded-full mb-xl overflow-hidden">
<div class="h-full bg-primary-container w-1/3 step-transition" id="progress-bar"></div>
</div>
<!-- Heading Section -->
<section class="mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-md">What best describes you?</h1>
<p class="font-body-md text-body-md text-on-surface-variant">This ensures you receive a personalized journey instead of a one-size-fits-all solution.</p>
</section>
<!-- Selection Cards (Bento-inspired asymmetric logic) -->
<div class="space-y-md flex-grow">
<!-- Option 1: Beginner -->
<button class="w-full text-left bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex items-start gap-md transition-all duration-200 hover:shadow-lg active:scale-[0.98] cursor-pointer group" id="card-beginner" onclick="selectRole('beginner')">
<div class="bg-secondary-container text-on-secondary-container p-md rounded-lg flex items-center justify-center transition-colors group-hover:bg-primary group-hover:text-white">
<span class="material-symbols-outlined text-[32px]" data-icon="potted_plant">potted_plant</span>
</div>
<div class="flex-grow">
<h3 class="font-title-lg text-title-lg text-on-surface mb-xs">I am a Beginner</h3>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">I want to learn foundational farming skills.</p>
</div>
<div class="check-icon opacity-0 transition-opacity">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 2: Established Farmer -->
<button class="w-full text-left bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex items-start gap-md transition-all duration-200 hover:shadow-lg active:scale-[0.98] cursor-pointer group" id="card-pro" onclick="selectRole('pro')">
<div class="bg-secondary-container text-on-secondary-container p-md rounded-lg flex items-center justify-center transition-colors group-hover:bg-primary group-hover:text-white">
<span class="material-symbols-outlined text-[32px]" data-icon="agriculture">agriculture</span>
</div>
<div class="flex-grow">
<h3 class="font-title-lg text-title-lg text-on-surface mb-xs">I am an Established Farmer</h3>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">I want to scale my business and access financing.</p>
</div>
<div class="check-icon opacity-0 transition-opacity">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</div>
<!-- Atmospheric Illustration (Subtle) -->
<div class="mt-xl relative h-48 overflow-hidden rounded-xl border border-outline-variant">
<div class="absolute inset-0 bg-gradient-to-t from-primary/10 to-transparent z-10"></div>
<div class="absolute inset-0" data-alt="A serene, professional high-angle photograph of a modern sustainable farm with neat rows of lush green crops under soft morning sunlight. The image has a clean, corporate aesthetic with a palette of deep emerald greens and crisp earthy tones, conveying stability and growth." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAJRxD_S6Z7rogEPtlW2dWmofITJfdgGJnwGW3zsBOwMMIVnKHLiLmiYNDBqIskroDplq9CM-gXl4sNIVOnmiNDuHD-idHsm1xrXsx9dfMIBzUEiDXMfaru4fXC0FDdtvBaxkFiN9W2WNDTVBtFZ38wvc6NN4r8--IvV31bvyxRTY-3V2DqKzDzM1CH_nabOxqbKDkXHPt9sQPjI0GmzJL6jgUXCe7YKUGtud8H86zmVCU_CCXBeVkXHnRKOQ0ID_UEYMNsMGGGP6o')"></div>
<div class="absolute bottom-4 left-4 z-20 flex items-center gap-2 px-3 py-1 bg-white/80 backdrop-blur-sm rounded-full">
<span class="material-symbols-outlined text-sm text-primary" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="text-[10px] font-bold text-primary uppercase tracking-tighter">Bank-Grade Security</span>
</div>
</div>
</main>
<!-- Footer Action Area (Fixed Mobile) -->
<footer class="sticky bottom-0 w-full bg-surface p-margin-mobile border-t border-outline-variant flex items-center gap-4">
<button class="flex-grow h-14 bg-outline text-white font-bold rounded-xl flex items-center justify-center gap-2 transition-all duration-300 opacity-50 cursor-not-allowed" disabled="" id="next-btn">
<span>Next</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
<script>
        let selectedRole = null;

        function selectRole(role) {
            selectedRole = role;
            
            // Reset cards
            document.querySelectorAll('button[id^="card-"]').forEach(card => {
                card.classList.remove('border-primary', 'bg-primary-container/5', 'ring-1', 'ring-primary');
                card.classList.add('border-outline-variant', 'bg-surface-container-lowest');
                card.querySelector('.check-icon').classList.add('opacity-0');
            });

            // Highlight selected
            const selectedCard = document.getElementById(`card-${role}`);
            selectedCard.classList.remove('border-outline-variant', 'bg-surface-container-lowest');
            selectedCard.classList.add('border-primary', 'bg-primary-container/5', 'ring-1', 'ring-primary');
            selectedCard.querySelector('.check-icon').classList.remove('opacity-0');

            // Enable Next Button
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = false;
            nextBtn.classList.remove('bg-outline', 'opacity-50', 'cursor-not-allowed');
            nextBtn.classList.add('bg-primary', 'opacity-100', 'cursor-pointer');
            
            // Micro-interaction: Shimmer or slight lift
            nextBtn.classList.add('active:scale-95');
        }

        // Handle Next Click
        document.getElementById('next-btn').addEventListener('click', () => {
            if (!selectedRole) return;
            
            // Visual feedback for progression
            const progressBar = document.getElementById('progress-bar');
            progressBar.style.width = '66%';
            
            // In a real app, this would navigate to step 2
            console.log("Selected user role:", selectedRole);
            alert(`Personalizing ${selectedRole} experience... Progressing to Step 2.`);
        });
    </script>
</body></html>
